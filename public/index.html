<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Votazione Live - Selezione Ruolo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="top-right">
      <button class="button button-secondary" type="button" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/login.html'; }">Torna indietro</button>
      <button id="logoutBtn" class="button button-danger">Logout</button>
    </div>

    <div class="container fade-in">
      <section class="hero">
        <h1><span class="page-icon">&#127908;</span> Votazione Live</h1>
        <p id="roleInfo">Scegli il ruolo per accedere alla pagina corretta.</p>
      </section>

      <section class="card">
        <h2>Ruolo</h2>
        <div class="grid grid-2">
          <button class="button button-primary" data-role="judge" data-allow="regia,admin" type="button"><span>&#127942;</span> Giudice</button>
          <button class="button button-secondary" data-role="director" data-allow="gestione,admin" type="button"><span>&#127909;</span> Regia</button>
          <button class="button button-secondary" data-role="qrcode" data-allow="gestione,admin" type="button"><span>&#128279;</span> QR Accessi</button>
          <button class="button button-secondary" data-role="runoffManage" data-allow="gestione,admin" type="button"><span>&#128512;</span> Ballottaggio</button>
          <button class="button button-danger" data-role="performance" data-allow="admin" type="button"><span>&#127917;</span> Conduzione</button>
          <button class="button button-secondary" data-role="public" data-allow="admin" type="button"><span>&#127881;</span> Pubblico</button>
          <button class="button button-primary" data-role="lineup" data-allow="gestione,admin" type="button"><span>&#128203;</span> Lineup</button>
          <button class="button button-secondary" data-role="report" data-allow="gestione,admin" type="button"><span>&#128200;</span> Resoconto</button>
        </div>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const roleInfo = document.getElementById('roleInfo');

      async function applyRoleVisibility() {
        const response = await fetch('/api/auth/me');
        const data = await response.json();

        if (!data.authenticated) {
          window.location.href = '/login.html';
          return;
        }

        roleInfo.textContent = `Ruolo autenticato: ${data.displayRole || data.role}`;

        document.querySelectorAll('[data-role]').forEach((btn) => {
          const allow = String(btn.getAttribute('data-allow') || '');
          const allowedRoles = allow.split(',').map((item) => item.trim());
          const isAllowed = allowedRoles.includes('all') || allowedRoles.includes(data.role);
          btn.style.display = isAllowed ? '' : 'none';
        });

        if (data.role === 'regia') {
          window.location.href = '/judge.html';
        }
      }

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login.html';
      });

      document.querySelectorAll('[data-role]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const role = btn.getAttribute('data-role');
          socket.emit('role:selected', { role });

          const routeMap = {
            judge: '/judge.html',
            director: '/director.html',
            qrcode: '/qr-access.html',
            runoffManage: '/runoff-manage.html',
            public: '/public.html',
            performance: '/performance.html',
            lineup: '/lineup.html',
            report: '/report.html'
          };

          window.location.href = routeMap[role] || '/index.html';
        });
      });

      applyRoleVisibility();
    </script>
    <footer class="legal-signature">
      <p>Codice creato da Maikol Mudoni</p>
      <p>Uso commerciale non consentito</p>
      <p>Contatti: <a href="mailto:mistermudd92@gmail.com">mistermudd92@gmail.com</a></p>
      <p>Vuoi realizzare qualcosa di simile? Scrivimi via email per una collaborazione.</p>
    </footer>
  </body>
</html>
