<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Votazione Live</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container fade-in">
      <section class="hero">
        <h1><span class="page-icon">&#128274;</span> Accesso Votazione Live</h1>
        <p>Seleziona il profilo corretto e inserisci la password per accedere direttamente alla pagina consentita.</p>
      </section>

      <section class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <label for="role">Ruolo</label>
          <select id="role">
            <option value="gestione">Regia</option>
            <option value="regia">Giudice</option>
            <option value="admin">Admin</option>
          </select>

          <label for="password" style="margin-top: 12px; display: block;">Password</label>
          <input id="password" type="password" placeholder="Inserisci password" />

          <div style="display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;">
            <button id="loginBtn" class="button button-primary" type="submit">Accedi</button>
            <a class="button button-secondary" href="/public.html" style="text-decoration: none; display: inline-flex; align-items: center;">Vai al Pubblico</a>
          </div>
        </form>

        <p id="feedback"></p>
      </section>
    </div>

    <script>
      const roleSelect = document.getElementById('role');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const loginForm = document.getElementById('loginForm');
      const feedback = document.getElementById('feedback');

      async function submitLogin() {
        const role = roleSelect.value;
        const password = passwordInput.value.trim();

        if (!password) {
          feedback.textContent = 'Inserisci la password.';
          return false;
        }

        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role, password })
        });

        const data = await response.json();

        if (!response.ok) {
          feedback.textContent = data.error || 'Login non riuscito.';
          return false;
        }

        if (data.role === 'regia') {
          window.location.href = '/judge.html';
          return true;
        }

        window.location.href = '/index.html';
        return true;
      }

      loginBtn.addEventListener('click', () => {
        feedback.textContent = '';
      });

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        feedback.textContent = '';
        await submitLogin();
      });

      passwordInput.addEventListener('keydown', async (event) => {
        if (event.key !== 'Enter') {
          return;
        }

        event.preventDefault();
        feedback.textContent = '';
        await submitLogin();
      });
    </script>

    <footer style="text-align:center; padding: 24px 0 12px; font-size: 0.82rem; opacity: 0.6;">
      <a href="/cookie-policy.html" style="color: inherit;">Cookie Policy</a>
    </footer>
  </body>
</html>
