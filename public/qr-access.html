<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Accessi - Votazione Live</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .qr-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .qr-box {
        border: 1px solid #e7e0d3;
        border-radius: 14px;
        padding: 14px;
        background: #fff8ec;
      }

      .qr-target {
        min-height: 240px;
        display: grid;
        place-items: center;
        background: #fff;
        border-radius: 12px;
        border: 1px dashed #d6cebf;
        margin-top: 10px;
      }

      .url-row {
        margin-top: 12px;
        word-break: break-all;
      }

      @media (max-width: 820px) {
        .qr-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-right">
      <button class="button button-secondary" type="button" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/index.html'; }">Torna indietro</button>
    </div>

    <div class="container fade-in">
      <section class="hero">
        <h1><span class="page-icon">&#128279;</span> QR Accessi</h1>
        <p>Inserisci l'URL base (esempio: https://evento.example.com) per creare i QR di accesso Regia e Pubblico.</p>
      </section>

      <section class="card">
        <h2>Generatore</h2>
        <label for="baseUrl">URL base</label>
        <input id="baseUrl" type="url" placeholder="https://mio-evento.it" />

        <label for="regiaTarget" style="display: block; margin-top: 12px;">Destinazione QR Regia</label>
        <select id="regiaTarget">
          <option value="director" selected>Accesso diretto a Regia (/director.html)</option>
          <option value="login">Passa dalla Login (/login.html)</option>
        </select>

        <div style="display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;">
          <button id="generateBtn" class="button button-primary" type="button">Genera QR</button>
          <button id="resetBtn" class="button button-secondary" type="button">Reset</button>
        </div>

        <p id="errorText" style="color: #8f231b; min-height: 24px; margin-top: 8px;"></p>
      </section>

      <section class="card">
        <h2>QR pronti da mostrare</h2>
        <div class="qr-grid">
          <article class="qr-box">
            <h3>Regia</h3>
            <p id="regiaDescription">Accesso pagina regia.</p>
            <div id="regiaQr" class="qr-target">In attesa di generazione</div>
            <p class="url-row"><a id="regiaLink" href="#" target="_blank" rel="noopener"></a></p>
          </article>

          <article class="qr-box">
            <h3>Pubblico</h3>
            <p>Accesso pagina voto pubblico.</p>
            <div id="publicQr" class="qr-target">In attesa di generazione</div>
            <p class="url-row"><a id="publicLink" href="#" target="_blank" rel="noopener"></a></p>
          </article>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script>
      const baseUrlInput = document.getElementById('baseUrl');
      const regiaTarget = document.getElementById('regiaTarget');
      const regiaDescription = document.getElementById('regiaDescription');
      const generateBtn = document.getElementById('generateBtn');
      const resetBtn = document.getElementById('resetBtn');
      const errorText = document.getElementById('errorText');

      const regiaQr = document.getElementById('regiaQr');
      const publicQr = document.getElementById('publicQr');
      const regiaLink = document.getElementById('regiaLink');
      const publicLink = document.getElementById('publicLink');

      function normalizeBaseUrl(value) {
        const raw = String(value || '').trim();
        if (!raw) {
          return null;
        }

        const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
        let url;
        try {
          url = new URL(withProtocol);
        } catch (_error) {
          return null;
        }

        return `${url.origin}${url.pathname}`.replace(/\/+$/, '');
      }

      function joinUrl(base, pagePath) {
        const cleanPath = String(pagePath || '').startsWith('/') ? pagePath : `/${pagePath}`;
        return `${base}${cleanPath}`;
      }

      async function renderQr(targetNode, value) {
        targetNode.innerHTML = '';
        await QRCode.toCanvas(targetNode, value, {
          width: 220,
          margin: 2,
          color: {
            dark: '#1d1f24',
            light: '#ffffff'
          }
        });
      }

      function getRegiaPath() {
        return regiaTarget.value === 'login' ? '/login.html' : '/director.html';
      }

      function refreshRegiaDescription() {
        regiaDescription.textContent =
          regiaTarget.value === 'login'
            ? 'Accesso tramite login per ruolo Regia.'
            : 'Accesso diretto alla pagina Regia.';
      }

      async function generateQrs() {
        errorText.textContent = '';
        const normalized = normalizeBaseUrl(baseUrlInput.value);

        if (!normalized) {
          errorText.textContent = 'Inserisci un URL valido.';
          return;
        }

        const regiaUrl = joinUrl(normalized, getRegiaPath());
        const pubblicoUrl = joinUrl(normalized, '/public.html');

        await renderQr(regiaQr, regiaUrl);
        await renderQr(publicQr, pubblicoUrl);

        regiaLink.href = regiaUrl;
        regiaLink.textContent = regiaUrl;

        publicLink.href = pubblicoUrl;
        publicLink.textContent = pubblicoUrl;
      }

      function resetAll() {
        baseUrlInput.value = '';
        regiaTarget.value = 'director';
        refreshRegiaDescription();
        errorText.textContent = '';
        regiaQr.textContent = 'In attesa di generazione';
        publicQr.textContent = 'In attesa di generazione';
        regiaLink.removeAttribute('href');
        publicLink.removeAttribute('href');
        regiaLink.textContent = '';
        publicLink.textContent = '';
      }

      generateBtn.addEventListener('click', () => {
        generateQrs().catch(() => {
          errorText.textContent = 'Errore durante la generazione del QR code.';
        });
      });

      regiaTarget.addEventListener('change', refreshRegiaDescription);
      resetBtn.addEventListener('click', resetAll);
      refreshRegiaDescription();
    </script>
  </body>
</html>
