<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giudice - Votazione Live</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="top-right">
      <button class="button button-secondary" type="button" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/index.html'; }">Torna indietro</button>
      <button id="logoutBtn" class="button button-danger" type="button">Logout</button>
    </div>

    <div class="container fade-in">
      <section class="hero">
        <h1><span class="page-icon">&#127942;</span> Pagina Giudice</h1>
        <p id="artistLabel">In attesa dell'artista...</p>
        <p id="songLabel"></p>
        <span id="statusChip" class="status-chip status-closed">Votazione chiusa</span>
        <p id="votedBadge" style="display: none; margin-top: 10px;"><strong>Hai gia votato questa esibizione</strong></p>
      </section>

      <section class="card">
        <h2>Il tuo voto</h2>
        <label for="judgeName">Nome giudice</label>
        <input id="judgeName" type="text" placeholder="Es: Giudice 1" />

        <p>Seleziona un punteggio da 1 a 10:</p>
        <div id="scoreButtons" class="score-buttons"></div>
        <p id="waitNextMessage" style="display: none;"><strong>Hai gia votato. Attendi la prossima votazione.</strong></p>

        <button id="sendVoteBtn" class="button button-primary" style="margin-top: 12px;">
          Invia voto
        </button>
        <p id="feedback"></p>
      </section>

      <section id="runoffSection" class="card" style="display: none;">
        <h2>Ballottaggio Attivo</h2>
        <p id="runoffStatus">Ballottaggio non attivo.</p>
        <p id="runoffVotedBadge" style="display: none;"><strong>Hai gia votato in questo ballottaggio</strong></p>
        <div id="runoffChoices" class="grid" style="margin-top: 12px;"></div>
        <p id="runoffFeedback"></p>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const artistLabel = document.getElementById('artistLabel');
      const statusChip = document.getElementById('statusChip');
      const songLabel = document.getElementById('songLabel');
      const scoreButtons = document.getElementById('scoreButtons');
      const sendVoteBtn = document.getElementById('sendVoteBtn');
      const judgeNameInput = document.getElementById('judgeName');
      const feedback = document.getElementById('feedback');
      const votedBadge = document.getElementById('votedBadge');
      const waitNextMessage = document.getElementById('waitNextMessage');
      const runoffSection = document.getElementById('runoffSection');
      const runoffStatus = document.getElementById('runoffStatus');
      const runoffVotedBadge = document.getElementById('runoffVotedBadge');
      const runoffChoices = document.getElementById('runoffChoices');
      const runoffFeedback = document.getElementById('runoffFeedback');
      const JUDGE_VOTED_KEY = 'judge-voted-per-lineup';

      let selectedScore = null;
      let canVote = false;
      let currentLineupId = null;
      let runoffState = null;
      let latestState = {
        currentArtist: '',
        currentSong: '',
        currentLineupId: null,
        isOpenForVoting: false
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function getJudgeVoteMap() {
        try {
          const parsed = JSON.parse(localStorage.getItem(JUDGE_VOTED_KEY) || '{}');
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_error) {
          return {};
        }
      }

      function judgeVoteKey(lineupId, judgeName) {
        return `${lineupId || 'none'}::${String(judgeName || '').trim().toLowerCase()}`;
      }

      function markJudgeVoted(lineupId, judgeName) {
        const map = getJudgeVoteMap();
        map[judgeVoteKey(lineupId, judgeName)] = true;
        localStorage.setItem(JUDGE_VOTED_KEY, JSON.stringify(map));
      }

      function hasJudgeVoted(lineupId, judgeName) {
        const name = String(judgeName || '').trim();
        if (!lineupId || !name) {
          return false;
        }
        const map = getJudgeVoteMap();
        return Boolean(map[judgeVoteKey(lineupId, name)]);
      }

      function animateSuccess(node) {
        node.classList.remove('flash-success');
        void node.offsetWidth;
        node.classList.add('flash-success');
      }

      for (let i = 1; i <= 10; i += 1) {
        const btn = document.createElement('button');
        btn.className = 'score-btn';
        btn.textContent = String(i);
        btn.type = 'button';
        btn.addEventListener('click', () => {
          selectedScore = i;
          document.querySelectorAll('.score-btn').forEach((node) => node.classList.remove('selected'));
          btn.classList.add('selected');
        });
        scoreButtons.appendChild(btn);
      }

      function renderState(payload) {
        latestState = {
          currentArtist: payload.currentArtist || '',
          currentSong: payload.currentSong || '',
          currentLineupId: payload.currentLineupId || null,
          isOpenForVoting: Boolean(payload.isOpenForVoting)
        };

        const artist = latestState.currentArtist;
        const open = latestState.isOpenForVoting;
        const song = latestState.currentSong;
        currentLineupId = latestState.currentLineupId;
        const alreadyVoted = hasJudgeVoted(currentLineupId, judgeNameInput.value);

        artistLabel.textContent = artist
          ? `Artista in esibizione: ${artist}`
          : "In attesa dell'artista...";
        songLabel.textContent = song ? `Nome esibizione: ${song}` : '';

        canVote = open && Boolean(artist) && !alreadyVoted;
        statusChip.textContent = canVote ? 'Votazione aperta' : 'Votazione non attiva';
        statusChip.className = `status-chip ${canVote ? 'status-open' : 'status-closed'}`;
        votedBadge.style.display = alreadyVoted ? 'block' : 'none';
        scoreButtons.style.display = alreadyVoted ? 'none' : 'grid';
        sendVoteBtn.style.display = alreadyVoted ? 'none' : 'inline-block';
        waitNextMessage.style.display = alreadyVoted ? 'block' : 'none';
      }

      async function refreshRunoffSection() {
        const judgeName = judgeNameInput.value.trim();

        if (!runoffState || !runoffState.hasActiveRunoff) {
          runoffSection.style.display = 'none';
          runoffFeedback.textContent = '';
          return;
        }

        runoffSection.style.display = '';
        let hasVoted = false;

        if (judgeName) {
          const params = new URLSearchParams({ role: 'judge', voterName: judgeName });
          const statusResponse = await fetch(`/api/runoff/vote-status?${params.toString()}`);
          if (statusResponse.ok) {
            const statusData = await statusResponse.json();
            hasVoted = Boolean(statusData.hasVoted);
          }
        }

        runoffStatus.textContent = runoffState.isOpenForVoting
          ? 'Ballottaggio aperto: scegli un solo artista.'
          : 'Ballottaggio chiuso.';
        runoffVotedBadge.style.display = hasVoted ? 'block' : 'none';

        runoffChoices.innerHTML = (runoffState.artists || [])
          .map((artist) => {
            const disabled = !runoffState.isOpenForVoting || hasVoted || !judgeName;
            const label = `${escapeHtml(artist.artistName)}${
              artist.performanceName ? ` - ${escapeHtml(artist.performanceName)}` : ''
            }`;
            return `<button class="button button-primary" data-runoff-lineup-id="${artist.lineupId}" ${disabled ? 'disabled' : ''}>${label}</button>`;
          })
          .join('');
      }

      async function loadRunoffState() {
        const response = await fetch('/api/runoff/state');
        if (!response.ok) {
          runoffState = null;
          runoffSection.style.display = 'none';
          return;
        }
        runoffState = await response.json();
        await refreshRunoffSection();
      }

      socket.on('state:init', (payload) => renderState(payload));
      socket.on('state:updated', (payload) => renderState(payload));
      socket.on('artist:changed', (payload) => {
        feedback.textContent = '';
        selectedScore = null;
        document.querySelectorAll('.score-btn').forEach((node) => node.classList.remove('selected'));
        renderState(payload);
      });
      socket.on('voting:closed', (payload) => renderState(payload));
      socket.on('votes:cleared', (payload) => {
        localStorage.removeItem(JUDGE_VOTED_KEY);
        feedback.textContent = '';
        renderState(payload);
      });
      socket.on('runoff:state', async (payload) => {
        runoffState = payload;
        await refreshRunoffSection();
      });
      socket.on('runoff:started', async (payload) => {
        runoffFeedback.textContent = '';
        runoffState = payload;
        await refreshRunoffSection();
      });
      socket.on('runoff:closed', async (payload) => {
        runoffState = payload;
        await refreshRunoffSection();
      });
      socket.on('runoff:vote-updated', async (payload) => {
        runoffState = payload;
        await refreshRunoffSection();
      });

      judgeNameInput.addEventListener('input', async () => {
        renderState(latestState);
        await refreshRunoffSection();
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login.html';
      });

      sendVoteBtn.addEventListener('click', async () => {
        const judgeName = judgeNameInput.value.trim();

        if (!canVote) {
          feedback.textContent = 'Votazione non attiva.';
          return;
        }

        if (!judgeName) {
          feedback.textContent = 'Inserisci il nome del giudice.';
          return;
        }

        if (!selectedScore) {
          feedback.textContent = 'Seleziona un punteggio da 1 a 10.';
          return;
        }

        const confirmed = window.confirm(`Confermi il voto ${selectedScore}/10?`);
        if (!confirmed) {
          return;
        }

        const response = await fetch('/api/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            role: 'judge',
            voterName: judgeName,
            score: selectedScore
          })
        });

        const data = await response.json();

        if (!response.ok) {
          feedback.textContent = data.error || 'Errore durante il voto.';
          return;
        }

        feedback.textContent = `Voto inviato: ${selectedScore}/10`;
        animateSuccess(feedback);
        markJudgeVoted(currentLineupId, judgeName);
        renderState(latestState);
      });

      runoffChoices.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) {
          return;
        }

        const selectedLineupId = Number(target.getAttribute('data-runoff-lineup-id'));
        const judgeName = judgeNameInput.value.trim();

        if (!selectedLineupId || !judgeName) {
          runoffFeedback.textContent = 'Inserisci il nome giudice prima di votare il ballottaggio.';
          return;
        }

        const confirmed = window.confirm(`Confermi il voto ballottaggio per ${target.textContent}?`);
        if (!confirmed) {
          return;
        }

        const response = await fetch('/api/runoff/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role: 'judge', voterName: judgeName, selectedLineupId })
        });
        const data = await response.json();
        runoffFeedback.textContent = response.ok
          ? data.message || 'Voto ballottaggio registrato.'
          : data.error || 'Errore voto ballottaggio.';
        if (response.ok) {
          animateSuccess(runoffFeedback);
        }
        await loadRunoffState();
      });

      loadRunoffState();
    </script>
  </body>
</html>
