<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conduzione - Votazione Live</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .control-actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .control-actions .button {
        min-width: 160px;
        min-height: 64px;
        display: inline-flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        line-height: 1.2;
        text-align: center;
      }

      .control-actions .button .btn-icon {
        font-size: 1.1rem;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div class="top-right">
      <button class="button button-secondary" type="button" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/index.html'; }">Torna indietro</button>
    </div>

    <div class="container fade-in">
      <section class="hero">
        <h1><span class="page-icon">&#127917;</span> Conduzione Esibizioni</h1>
        <p>Avvia, metti in pausa, termina e passa al prossimo artista automaticamente.</p>
      </section>

      <section class="card">
        <h2>Controlli live</h2>
        <label for="lineupSelect">Seleziona artista dalla lineup</label>
        <select id="lineupSelect"></select>

        <div class="control-actions">
          <button id="startBtn" class="button button-primary" type="button">
            <span class="btn-icon" aria-hidden="true">▶</span>
            <span>Inizia<br />esibizione</span>
          </button>
          <button id="pauseBtn" class="button button-secondary" type="button">
            <span class="btn-icon" aria-hidden="true">⏸</span>
            <span>Pausa<br />votazione</span>
          </button>
          <button id="resumeBtn" class="button button-secondary" type="button">
            <span class="btn-icon" aria-hidden="true">⏯</span>
            <span>Riprendi<br />votazione</span>
          </button>
          <button id="terminateBtn" class="button button-danger" type="button">
            <span class="btn-icon" aria-hidden="true">⏹</span>
            <span>Termina<br />esibizione</span>
          </button>
          <button id="nextBtn" class="button button-primary" type="button">
            <span class="btn-icon" aria-hidden="true">⏭</span>
            <span>Prossimo<br />in ordine</span>
          </button>
          <button id="clearVotesBtn" class="button button-danger" type="button">
            <span class="btn-icon" aria-hidden="true">🗑</span>
            <span>Pulisci dati<br />votazioni</span>
          </button>
        </div>
        <p id="feedback"></p>
      </section>

      <section class="card">
        <h2>Stato corrente</h2>
        <p id="currentArtist">Nessuna esibizione attiva.</p>
        <p id="votingState">Votazione chiusa.</p>
        <p id="nextArtist">Nessun prossimo artista disponibile.</p>
      </section>

      <section class="card">
        <h2>Gestione Dati</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;">
          <button id="exportLineupBtn" class="button button-secondary" type="button">Scarica Lineup</button>
          <label class="button button-secondary" style="cursor: pointer; margin-bottom: 0;">
            Carica Lineup
            <input id="importLineupInput" type="file" accept=".json" style="display: none;" />
          </label>
          <button id="exportVotesBtn" class="button button-secondary" type="button">Scarica Voti</button>
          <label class="button button-secondary" style="cursor: pointer; margin-bottom: 0;">
            Carica Voti
            <input id="importVotesInput" type="file" accept=".json" style="display: none;" />
          </label>
        </div>
        <p id="dataFeedback" style="color: #2c5f2d;"></p>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const lineupSelect = document.getElementById('lineupSelect');
      const feedback = document.getElementById('feedback');
      const dataFeedback = document.getElementById('dataFeedback');
      const currentArtist = document.getElementById('currentArtist');
      const votingState = document.getElementById('votingState');
      const nextArtist = document.getElementById('nextArtist');
      const exportLineupBtn = document.getElementById('exportLineupBtn');
      const importLineupInput = document.getElementById('importLineupInput');
      const exportVotesBtn = document.getElementById('exportVotesBtn');
      const importVotesInput = document.getElementById('importVotesInput');

      function renderLineup(payload) {
        const lineup = payload.lineup || [];
        lineupSelect.innerHTML = '';

        lineup.forEach((row) => {
          const option = document.createElement('option');
          option.value = String(row.id);
          option.textContent = `${row.performance_order}. ${row.artist_name}${row.song_title ? ` - ${row.song_title}` : ''}`;
          lineupSelect.appendChild(option);
        });
      }

      function renderState(payload) {
        if (!payload.hasActivePerformance) {
          currentArtist.textContent = 'Nessuna esibizione attiva.';
          votingState.textContent = 'Votazione chiusa.';
        } else {
          currentArtist.textContent = `In corso: ${payload.currentOrder}. ${payload.currentArtist}${payload.currentSong ? ` - ${payload.currentSong}` : ''}`;
          votingState.textContent = payload.isOpenForVoting ? 'Votazione aperta.' : 'Votazione in pausa.';
        }

        if (payload.nextLineup) {
          nextArtist.textContent = `Prossimo: ${payload.nextLineup.performanceOrder}. ${payload.nextLineup.artistName}${payload.nextLineup.songTitle ? ` - ${payload.nextLineup.songTitle}` : ''}`;
        } else {
          nextArtist.textContent = 'Nessun prossimo artista disponibile.';
        }
      }

      async function sendAction(url, body = {}) {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await response.json();
        if (!response.ok) {
          feedback.textContent = data.error || 'Operazione non riuscita.';
          return;
        }

        feedback.textContent = data.message || 'Operazione completata.';
      }

      document.getElementById('startBtn').addEventListener('click', () => {
        const lineupId = Number(lineupSelect.value);
        if (!lineupId) {
          feedback.textContent = 'Seleziona un artista dalla lineup.';
          return;
        }
        sendAction('/api/performance/start', { lineupId });
      });

      document.getElementById('pauseBtn').addEventListener('click', () => sendAction('/api/performance/pause'));
      document.getElementById('resumeBtn').addEventListener('click', () => sendAction('/api/performance/resume'));
      document.getElementById('terminateBtn').addEventListener('click', () => sendAction('/api/performance/terminate'));
      document.getElementById('nextBtn').addEventListener('click', () => sendAction('/api/performance/next'));
      document.getElementById('clearVotesBtn').addEventListener('click', async () => {
        const confirmed = window.confirm('Confermi la pulizia di tutti i dati votazioni?');
        if (!confirmed) {
          return;
        }

        await sendAction('/api/admin/clear-votes');
      });

      exportLineupBtn.addEventListener('click', async () => {
        try {
          const response = await fetch('/api/admin/export-lineup');
          if (!response.ok) {
            dataFeedback.textContent = 'Errore durante lo scaricamento della lineup.';
            return;
          }

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `lineup-${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
          dataFeedback.textContent = 'Lineup scaricata con successo.';
        } catch (_error) {
          dataFeedback.textContent = 'Errore durante lo scaricamento della lineup.';
        }
      });

      importLineupInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) {
          return;
        }

        const confirmed = window.confirm('Confermi l\'importazione della nuova lineup? I dati attuali verranno sostituiti.');
        if (!confirmed) {
          importLineupInput.value = '';
          return;
        }

        try {
          const text = await file.text();
          const data = JSON.parse(text);

          const response = await fetch('/api/admin/import-lineup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          const result = await response.json();
          dataFeedback.textContent = response.ok
            ? `Lineup importata con successo (${result.count} elementi).`
            : result.error || 'Errore durante l\'importazione della lineup.';

          importLineupInput.value = '';
        } catch (_error) {
          dataFeedback.textContent = 'Errore durante la lettura del file JSON.';
          importLineupInput.value = '';
        }
      });

      exportVotesBtn.addEventListener('click', async () => {
        try {
          const response = await fetch('/api/admin/export-votes');
          if (!response.ok) {
            dataFeedback.textContent = 'Errore durante lo scaricamento dei voti.';
            return;
          }

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `votes-${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
          dataFeedback.textContent = 'Voti scaricati con successo.';
        } catch (_error) {
          dataFeedback.textContent = 'Errore durante lo scaricamento dei voti.';
        }
      });

      importVotesInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) {
          return;
        }

        const confirmed = window.confirm('Confermi l\'importazione dei nuovi voti? I dati attuali verranno sostituiti.');
        if (!confirmed) {
          importVotesInput.value = '';
          return;
        }

        try {
          const text = await file.text();
          const data = JSON.parse(text);

          const response = await fetch('/api/admin/import-votes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          const result = await response.json();
          dataFeedback.textContent = response.ok
            ? `Voti importati con successo (${result.count} elementi).`
            : result.error || 'Errore durante l\'importazione dei voti.';

          importVotesInput.value = '';
        } catch (_error) {
          dataFeedback.textContent = 'Errore durante la lettura del file JSON.';
          importVotesInput.value = '';
        }
      });

      socket.on('state:init', (payload) => renderState(payload));
      socket.on('state:updated', (payload) => renderState(payload));
      socket.on('lineup:updated', (payload) => renderLineup(payload));
    </script>
  </body>
</html>
